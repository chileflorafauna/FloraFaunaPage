name: Deploy to GitHub Pages

on:
  push:
    branches: ["main", "master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      NEXT_PUBLIC_CONTACT_ENDPOINT: ${{ vars.NEXT_PUBLIC_CONTACT_ENDPOINT || secrets.NEXT_PUBLIC_CONTACT_ENDPOINT }}
      NEXT_PUBLIC_SITE_URL: ${{ vars.NEXT_PUBLIC_SITE_URL || secrets.NEXT_PUBLIC_SITE_URL }}
      NEXT_PUBLIC_BASE_PATH: ""
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate contact endpoint for static deploy
        shell: bash
        run: |
          if [ -z "${NEXT_PUBLIC_CONTACT_ENDPOINT}" ]; then
            echo "NEXT_PUBLIC_CONTACT_ENDPOINT is missing."
            echo "For GitHub Pages static deploy, configure it as Repository Variable or Secret."
            exit 1
          fi

          if [[ "${NEXT_PUBLIC_CONTACT_ENDPOINT}" != https://* ]]; then
            echo "NEXT_PUBLIC_CONTACT_ENDPOINT must be an absolute https URL to your Worker."
            echo "Current value: ${NEXT_PUBLIC_CONTACT_ENDPOINT}"
            exit 1
          fi

      - name: Build static site
        run: npm run build

      - name: Verify root-path export
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          if [ -z "${NEXT_PUBLIC_BASE_PATH}" ]; then
            if grep -R "/${REPO_NAME}/" out -n --include="*.html"; then
              echo "Found '/${REPO_NAME}/' in exported HTML while NEXT_PUBLIC_BASE_PATH is empty."
              echo "This would break assets/routes on a custom domain."
              exit 1
            fi
          fi

      - name: Add compatibility alias for legacy repo-path URLs
        shell: bash
        run: |
          REPO_NAME="${GITHUB_REPOSITORY#*/}"

          if [ -z "${NEXT_PUBLIC_BASE_PATH}" ]; then
            mkdir -p "out/${REPO_NAME}"
            rsync -a --delete --exclude "${REPO_NAME}" out/ "out/${REPO_NAME}/"
          fi

      - name: Add nojekyll file
        run: touch out/.nojekyll

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4